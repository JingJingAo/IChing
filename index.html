<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>易经六十四卦 · 3:4 黄金版</title>
    <!-- 引用你重命名的简体数据库 -->
    <script src="./data simple.js"></script>
    
    <style>
        /* 字体引入 */
        @font-face { 
            font-family: 'MiLanting'; 
            src: url('./fonts/MI_LanTing_Regular.ttf') format('truetype'); 
            font-display: swap; 
        }

        :root {
            --ink: #1a1a1a;
            --ink-soft: #444;
            --radius-md: 12px;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            font-family: 'MiLanting', sans-serif !important; 
        }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            margin: 0; padding: 0; background-color: #f4f4f2;
        }
        
        body { 
            display: flex; align-items: center; justify-content: center;
            background-image: url('./images/界面背景.png');
            background-size: cover; background-position: center;
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom);
        }

        /* 主容器：强制 3:4 比例 */
        .yj-master-card {
            width: 100%;
            max-width: 500px; /* 手机端主流宽度 */
            aspect-ratio: 3 / 4; 
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            display: grid;
            grid-template-rows: 1.2fr 1.5fr 4fr; /* 上中下三层比例 */
            gap: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* 通用对半分栅格 */
        .yj-grid-half {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: stretch;
        }

        /* 第一层：卦名 & 大象 */
        .yj-seal-box { display: flex; align-items: center; gap: 12px; }
        .yj-img-seal {
            width: 50px; height: 50px; flex: 0 0 50px; background-size: cover;
        }
        .img-gua { background-image: url('./images/卦名背景.png'); border-radius: 50%; }
        .img-xiang { background-image: url('./images/大象.png'); }
        
        .title-text { font-size: clamp(24px, 6vw, 32px); font-weight: 600; line-height: 1; }
        .sub-text { font-size: 11px; color: var(--ink-soft); margin-top: 4px; letter-spacing: 1px; }
        
        .xiang-text { font-size: clamp(14px, 3.5vw, 16px); line-height: 1.4; font-weight: 600; }
        .xiang-text b { display: block; font-weight: 400; font-size: 0.85em; margin-top: 2px; color: var(--ink-soft); }

        /* 第二层：卦辞 & 彖传 */
        .yj-guaci-box {
            font-size: clamp(18px, 4.5vw, 22px); line-height: 1.4; font-weight: 600;
            padding-left: 15px; border-left: 5px solid var(--ink);
            display: flex; align-items: center;
        }
        .yj-tuan-box {
            background-image: url('./images/彖传背景.png'); background-size: cover;
            border-radius: var(--radius-md); padding: 12px;
            display: flex; flex-direction: column; justify-content: center;
        }
        .tuan-content { font-size: clamp(12px, 3vw, 14px); line-height: 1.5; text-align: justify; }

        /* 第三层：六爻区域（占版面最大部分） */
        .yj-lines-container {
            display: flex; flex-direction: column; justify-content: space-between;
            min-height: 0; /* 允许内部滚动或压缩 */
        }
        .yj-yao-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: center;
            padding: 6px 0; border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .yj-line { height: 28px; width: 90%; display: flex; gap: 8px; cursor: pointer; margin: 0 auto; }
        .yj-seg { height: 100%; box-shadow: inset 0 1px 2px rgba(255,255,255,0.2); }
        .yj-line.yang .yj-seg { flex: 1; background: #1a1a1a; border-radius: 2px; }
        .yj-line.yin .yj-seg { flex: 1; background: #888; border-radius: 15px; }
        .yj-line.yin .yj-gap { flex: 0 0 15px; }

        .yao-text { font-size: clamp(12px, 3.2vw, 14px); line-height: 1.3; font-weight: 600; }
        .yao-text i { display: block; font-style: normal; font-size: 0.85em; font-weight: 400; color: var(--ink-soft); margin-top: 2px; }

        .yj-footer { 
            position: absolute; bottom: 10px; width: 100%; text-align: center; 
            font-size: 10px; color: var(--ink-soft); opacity: 0.5; letter-spacing: 2px;
        }

        /* 针对极窄屏幕的微调 */
        @media (max-height: 600px) {
            .yj-master-card { aspect-ratio: auto; height: 95vh; }
        }
    </style>
</head>
<body>

<div class="yj-master-card">
    <!-- 上：名象 -->
    <div class="yj-grid-half">
        <div class="yj-seal-box">
            <div class="yj-img-seal img-gua"></div>
            <div>
                <div class="title-text" id="yjGuaName"></div>
                <div class="sub-text">周易六十四卦</div>
            </div>
        </div>
        <div class="yj-seal-box">
            <div class="yj-img-seal img-xiang"></div>
            <div class="xiang-text" id="yjDaxiang"></div>
        </div>
    </div>

    <!-- 中：辞彖 -->
    <div class="yj-grid-half">
        <div class="yj-guaci-box" id="yjGuaci"></div>
        <div class="yj-tuan-box">
            <div class="tuan-content" id="yjTuan"></div>
        </div>
    </div>

    <!-- 下：六爻 -->
    <div id="yjMainContent" class="yj-lines-container"></div>
</div>

<div class="yj-footer">点击六爻 · 阴阳交替</div>

<script>
    // 默认起始卦（噬嗑 101001）
    let state = [1,0,1,0,0,1]; 

    function render() {
        const k = state.join('');
        // 检查 data simple.js 是否加载成功
        if (typeof GUA === 'undefined' || !GUA[k]) {
            console.error("未找到卦象数据，请检查 data simple.js 是否正确上传");
            return;
        }
        const g = GUA[k];

        document.getElementById('yjGuaName').innerText = g.name;
        document.getElementById('yjGuaci').innerText = g.guaci;
        document.getElementById('yjTuan').innerText = g.tuan;
        
        // 大象传修复：严格拆分两句并分行
        const dxParts = g.daxiang.split(/[。！？]/).filter(p => p.trim() !== '');
        if (dxParts.length >= 2) {
            document.getElementById('yjDaxiang').innerHTML = `${dxParts[0]}。<br><b>${dxParts[1]}。</b>`;
        } else {
            document.getElementById('yjDaxiang').innerText = g.daxiang;
        }
        
        const mainBox = document.getElementById('yjMainContent');
        mainBox.innerHTML = '';
        
        // 渲染六爻：从上爻到初爻
        state.forEach((s, i) => {
            const row = document.createElement('div');
            row.className = 'yj-yao-row';
            
            // 左：爻条
            const barWrap = document.createElement('div');
            const l = document.createElement('div');
            l.className = 'yj-line ' + (s ? 'yang' : 'yin');
            l.innerHTML = s ? '<div class="yj-seg"></div>' : '<div class="yj-seg"></div><div class="yj-gap"></div><div class="yj-seg"></div>';
            l.onclick = () => { state[i] = state[i] ? 0 : 1; render(); };
            barWrap.appendChild(l);
            
            // 右：爻辞
            const textWrap = document.createElement('div');
            textWrap.className = 'yao-text';
            const yaoData = g.yao[i]; // [爻辞, 小象]
            textWrap.innerHTML = `${yaoData[0]}<i>象曰：${yaoData[1]}</i>`;
            
            row.appendChild(barWrap);
            row.appendChild(textWrap);
            mainBox.appendChild(row);
        });
    }

    window.onload = () => { setTimeout(render, 300); };
</script>
</body>
</html>
