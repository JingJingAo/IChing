<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>易经六十四卦 · 比例复刻版</title>
    
    <!-- 强制刷新缓存，确保读取最新的 data_simple.js -->
    <script src="./data_simple.js?v=1.1"></script>
    
    <style>
        @font-face { 
            font-family: 'MiLanting'; 
            src: url('./fonts/MI_LanTing_Regular.ttf') format('truetype'); 
            font-display: swap; 
        }

        :root {
            --ink: #1a1a1a;
            --ink-soft: #444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'MiLanting', sans-serif !important; }
        
        html, body { height: 100%; width: 100%; overflow: hidden; margin: 0; padding: 0; }
        
        body { 
            display: flex; flex-direction: column;
            background-image: url('./images/界面背景.png');
            background-size: cover; background-position: center;
            padding: env(safe-area-inset-top) 5% env(safe-area-inset-bottom);
        }

        /* 布局比例 */
        .yj-main-layout {
            flex: 1; display: grid;
            grid-template-columns: 1fr 1.2fr; 
            grid-template-rows: 1.2fr 1.8fr 4fr; 
            gap: 20px 40px;
            padding: 20px 0;
            max-width: 1000px; margin: 0 auto; width: 100%;
        }

        .left-top-name {
            display: flex; align-items: center; justify-content: flex-start;
            background-image: url('./images/卦名背景.png');
            background-size: contain; background-repeat: no-repeat; background-position: left center;
            font-size: clamp(45px, 12vw, 80px); font-weight: 600; padding-left: 10px;
        }

        .right-top-xiang { display: flex; align-items: center; gap: 15px; }
        .img-xiang-icon {
            width: 60px; height: 60px; flex: 0 0 60px;
            background-image: url('./images/大象.png'); background-size: contain; background-repeat: no-repeat;
        }
        .xiang-text-box { font-size: clamp(15px, 3.8vw, 19px); line-height: 1.4; font-weight: 600; }
        .xiang-text-box b { display: block; font-weight: 500; font-size: 0.9em; color: var(--ink-soft); margin-top: 4px; }

        .left-mid-guaci {
            display: flex; align-items: center;
            font-size: clamp(22px, 5.5vw, 30px); line-height: 1.5; font-weight: 600;
        }

        .right-mid-tuan {
            background-image: url('./images/彖传背景.png'); background-size: cover;
            border-radius: 8px; padding: 18px; display: flex; flex-direction: column; justify-content: center;
        }
        .tuan-inner { font-size: clamp(13px, 3.2vw, 16px); line-height: 1.6; text-align: justify; }

        .bottom-full-area {
            grid-column: 1 / 3; display: flex; flex-direction: column; justify-content: space-between;
        }
        .yao-row {
            display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; align-items: center;
            padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .line-box { height: clamp(28px, 5.5vh, 40px); width: 100%; display: flex; gap: 12px; cursor: pointer; }
        .seg { height: 100%; }
        .line-box.yang .seg { flex: 1; background: #1a1a1a; border-radius: 2px; }
        .line-box.yin .seg { flex: 1; background: #999; border-radius: 20px; }
        .line-box.yin .gap { flex: 0 0 20px; }

        .text-box { font-size: clamp(13px, 3.4vw, 16px); line-height: 1.4; font-weight: 600; }
        .text-box i { display: block; font-style: normal; font-size: 0.85em; font-weight: 400; color: var(--ink-soft); margin-top: 3px; }

        .yj-footer { position: absolute; bottom: 8px; width: 100%; text-align: center; font-size: 10px; opacity: 0.4; }

        @media (max-width: 500px) {
            .yj-main-layout { gap: 10px 20px; }
            .yao-row { gap: 20px; }
        }
    </style>
</head>
<body>

<div class="yj-main-layout" id="mainLayout" style="visibility: hidden;">
    <div class="left-top-name" id="yjGuaName"></div>
    <div class="right-top-xiang">
        <div class="img-xiang-icon"></div>
        <div class="xiang-text-box" id="yjDaxiang"></div>
    </div>

    <div class="left-mid-guaci" id="yjGuaci"></div>
    <div class="right-mid-tuan">
        <div class="tuan-inner" id="yjTuan"></div>
    </div>

    <div class="bottom-full-area" id="yjMainContent"></div>
</div>

<div id="loading" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-size:20px;">加载中...</div>

<script>
    let state = [1,0,1,0,0,1]; 

    function render() {
        // 1. 核心检查：GUA 对象是否存在
        if (typeof GUA === 'undefined') {
            console.error("GUA data not found!");
            return;
        }

        const k = state.join('');
        const g = GUA[k];
        if (!g) return;

        // 显示界面，隐藏加载提示
        document.getElementById('mainLayout').style.visibility = 'visible';
        document.getElementById('loading').style.display = 'none';

        document.getElementById('yjGuaName').innerText = g.name;
        document.getElementById('yjGuaci').innerText = g.guaci;
        document.getElementById('yjTuan').innerText = g.tuan;
        
        // 2. 大象传手动分行逻辑：找到第一个句号
        const fullDx = g.daxiang || "";
        const firstDotIndex = fullDx.indexOf('。');
        if (firstDotIndex !== -1) {
            const part1 = fullDx.substring(0, firstDotIndex + 1);
            const part2 = fullDx.substring(firstDotIndex + 1);
            document.getElementById('yjDaxiang').innerHTML = part1 + "<br><b>" + part2 + "</b>";
        } else {
            document.getElementById('yjDaxiang').innerText = fullDx;
        }
        
        const mainBox = document.getElementById('yjMainContent');
        mainBox.innerHTML = '';
        
        // 3. 渲染六爻
        state.forEach((s, i) => {
            const row = document.createElement('div');
            row.className = 'yao-row';
            
            const l = document.createElement('div');
            l.className = 'line-box ' + (s ? 'yang' : 'yin');
            l.innerHTML = s ? '<div class="seg"></div>' : '<div class="seg"></div><div class="gap"></div><div class="seg"></div>';
            l.onclick = () => { state[i] = state[i] ? 0 : 1; render(); };
            
            const textWrap = document.createElement('div');
            textWrap.className = 'text-box';
            
            // 爻辞容错处理
            const yaoData = g.yao && g.yao[i] ? g.yao[i] : ["", ""];
            textWrap.innerHTML = yaoData[0] + "<i>象曰：" + yaoData[1] + "</i>";
            
            row.appendChild(l);
            row.appendChild(textWrap);
            mainBox.appendChild(row);
        });
    }

    // 4. 终极轮询加载逻辑
    function init() {
        let attempts = 0;
        const timer = setInterval(() => {
            if (typeof GUA !== 'undefined') {
                clearInterval(timer);
                render();
            } else {
                attempts++;
                if (attempts > 30) { // 15秒后提示错误
                    clearInterval(timer);
                    document.getElementById('loading').innerText = "数据加载失败，请检查 data_simple.js 文件内容是否正确。";
                }
            }
        }, 500);
    }

    window.onload = init;
</script>
</body>
</html>
