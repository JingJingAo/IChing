<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周易六十四卦交互看板</title>
    <style>
        body { font-family: "STKaiti", "KaiTi", serif; background-color: #f5f5f5; margin: 0; display: flex; justify-content: center; padding: 20px; color: #333; }
        .container { width: 950px; background: #fff; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: flex; gap: 50px; border-radius: 8px; }
        
        /* 左侧：卦象交互区 */
        .gua-visual { width: 320px; display: flex; flex-direction: column-reverse; gap: 15px; align-items: center; justify-content: center; }
        .yao { width: 240px; height: 35px; cursor: pointer; transition: all 0.2s; position: relative; }
        /* 阳爻样式 */
        .yao.yang { background-color: #222; border-radius: 2px; }
        /* 阴爻样式 */
        .yao.yin { display: flex; justify-content: space-between; background: transparent; }
        .yao.yin div { width: 105px; height: 35px; background-color: #222; border-radius: 2px; }
        .yao:hover { transform: scale(1.03); filter: brightness(1.5); }
        .yao::after { content: "点击切换"; position: absolute; right: -70px; top: 10px; font-size: 12px; color: #999; opacity: 0; }
        .yao:hover::after { opacity: 1; }

        /* 右侧：经文内容区 */
        .content { flex: 1; display: flex; flex-direction: column; }
        .header { border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 25px; }
        .gua-name { font-size: 64px; font-weight: 900; margin: 0; color: #000; }
        .guaci { font-size: 22px; margin-top: 15px; line-height: 1.6; color: #444; font-weight: bold; }
        
        .section { background: #f9f9f9; padding: 20px; margin-bottom: 20px; border-radius: 6px; border-left: 5px solid #ddd; }
        .section-title { font-weight: bold; color: #888; margin-bottom: 8px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .section-text { font-size: 17px; line-height: 1.7; }
        
        .yao-list { list-style: none; padding: 0; display: flex; flex-direction: column-reverse; gap: 15px; margin-top: 10px; }
        .yao-item { padding: 10px 15px; background: #fff; border: 1px solid #eee; border-radius: 4px; }
        .yao-main { font-size: 18px; font-weight: bold; margin-bottom: 5px; color: #111; }
        .yao-xiang { font-size: 15px; color: #666; }

        #error-msg { color: red; font-weight: bold; text-align: center; margin-top: 50px; display: none; }
    </style>
</head>
<body>

<div id="error-msg">数据加载失败，请确保 data_simple.js 已正确上传。</div>

<div class="container" id="main-ui">
    <!-- 左侧：六爻图形 -->
    <div class="gua-visual" id="guaContainer"></div>

    <!-- 右侧：经文详情 -->
    <div class="content">
        <div class="header">
            <h1 class="gua-name" id="guaName">...</h1>
            <div class="guaci" id="guaci"></div>
        </div>

        <div class="section">
            <div class="section-title">彖传</div>
            <div class="section-text" id="tuan"></div>
        </div>

        <div class="section">
            <div class="section-title">大象</div>
            <div class="section-text" id="daxiang"></div>
        </div>

        <div class="section-title">爻辞</div>
        <ul class="yao-list" id="yaoList"></ul>
    </div>
</div>

<!-- 引入你的数据文件 -->
<script src="data_simple.js"></script>

<script>
    // 初始卦象：需卦 (111010)
    // 数组索引 0 为初爻（最下），5 为上爻（最上）
    let currentGua = [1, 1, 1, 0, 1, 0];

    function render() {
        // 检查数据是否加载
        if (!window.IChingData) {
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('main-ui').style.display = 'none';
            return;
        }

        const guaKey = currentGua.join('');
        const data = window.IChingData[guaKey];

        if (!data) {
            console.error("未找到对应数据，Key:", guaKey);
            return;
        }

        // 1. 更新文字信息
        document.getElementById('guaName').innerText = data.name;
        document.getElementById('guaci').innerText = data.guaci;
        document.getElementById('tuan').innerText = data.tuan;
        document.getElementById('daxiang').innerText = data.daxiang;

        // 2. 渲染左侧六爻
        const guaContainer = document.getElementById('guaContainer');
        guaContainer.innerHTML = '';
        currentGua.forEach((isYang, index) => {
            const yaoDiv = document.createElement('div');
            // 如果是 1 则是阳爻，0 则是阴爻
            yaoDiv.className = `yao ${isYang === 1 ? 'yang' : 'yin'}`;
            if (isYang === 0) {
                yaoDiv.innerHTML = '<div></div><div></div>';
            }
            yaoDiv.title = `点击切换第${index + 1}爻`;
            yaoDiv.onclick = () => toggleYao(index);
            guaContainer.appendChild(yaoDiv);
        });

        // 3. 渲染右侧爻辞
        const yaoList = document.getElementById('yaoList');
        yaoList.innerHTML = '';
        if (data.yao && Array.isArray(data.yao)) {
            data.yao.forEach(y => {
                const li = document.createElement('li');
                li.className = 'yao-item';
                li.innerHTML = `
                    <div class="yao-main">${y[0]}</div>
                    <div class="yao-xiang">${y[1]}</div>
                `;
                yaoList.appendChild(li);
            });
        }
    }

    // 切换阴阳的函数
    function toggleYao(index) {
        currentGua[index] = currentGua[index] === 1 ? 0 : 1;
        render();
    }

    // 页面加载后执行
    window.onload = render;
</script>
</body>
</html>
