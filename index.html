<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>易经六十四卦 · 交互全息版</title>
    <script src="./data.js"></script>
    
    <style>
        /* 字体引入：仅保留小米兰亭 */
        @font-face { 
            font-family: 'MiLanting'; 
            src: url('./fonts/MI_LanTing_Regular.ttf') format('truetype'); 
            font-display: swap; 
        }

        :root {
            --ink: #1a1a1a; 
            --ink-soft: #444444;
            --radius-md: 12px; 
            --radius-pill: 20px;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'MiLanting', sans-serif !important; /* 全局强制小米兰亭 */
        }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            margin: 0; padding: 0;
        }
        
        body { 
            display: flex; flex-direction: column;
            background-image: url('./images/界面背景.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* 主容器 */
        .yj-container {
            flex: 1; display: flex; flex-direction: column;
            padding: 25px; gap: 25px; max-width: 900px; margin: 0 auto; width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        /* 严格对称栅格 */
        .yj-row-split {
            display: grid; grid-template-columns: 1fr 1fr; gap: 35px; align-items: stretch;
        }

        /* 第一模块：卦名 & 大象 */
        .yj-seal-box { display: flex; align-items: center; gap: 15px; height: 80px; }
        .yj-img-seal {
            width: 70px; height: 70px; flex: 0 0 70px; border-radius: 50%;
            background-size: cover; background-position: center;
        }
        .img-gua { background-image: url('./images/卦名背景.png'); }
        .img-xiang { background-image: url('./images/大象.png'); border-radius: 0; }
        
        .title-text { font-size: 38px; font-weight: 600; line-height: 1; color: var(--ink); }
        .sub-text { font-size: 13px; color: var(--ink-soft); margin-top: 6px; letter-spacing: 2px; }
        
        /* 大象传字体放大 */
        .xiang-text { font-size: 18px; line-height: 1.5; font-weight: 600; color: var(--ink); }
        .xiang-text b { display: block; font-weight: 500; font-size: 16px; margin-top: 4px; color: var(--ink-soft); }

        /* 第二模块：卦辞 & 彖传 */
        /* 卦辞字体放大 */
        .yj-guaci-box {
            font-size: 24px; line-height: 1.4; font-weight: 600; color: var(--ink);
            padding-left: 20px; border-left: 6px solid var(--ink);
            display: flex; align-items: center; min-height: 120px;
        }
        /* 彖传字体放大 */
        .yj-tuan-box {
            background-image: url('./images/彖传背景.png'); background-size: cover;
            border-radius: var(--radius-md); padding: 20px;
            display: flex; flex-direction: column; justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .img-tuan-icon {
            width: 30px; height: 30px; background-image: url('./images/彖传.png');
            background-size: contain; background-repeat: no-repeat; margin-bottom: 10px;
        }
        .tuan-content { font-size: 16px; line-height: 1.6; text-align: justify; color: var(--ink); font-weight: 500; }

        /* 第三模块：六爻与爻辞 */
        .yj-lines-master {
            flex: 1; display: flex; flex-direction: column;
            justify-content: space-between; min-height: 0; margin-top: 10px;
        }
        .yj-yao-line-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 35px; align-items: center;
            padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.08);
        }

        .yao-bar-wrap { display: flex; justify-content: center; width: 100%; }
        .yj-line { height: 36px; width: 85%; display: flex; gap: 12px; cursor: pointer; }
        .yj-seg { height: 100%; box-shadow: inset 0 1px 2px rgba(255,255,255,0.3), 0 1px 4px rgba(0,0,0,0.15); }
        .yj-line.yang .yj-seg { flex: 1; background: #1a1a1a; border-radius: 3px; }
        .yj-line.yin .yj-seg { flex: 1; background: #999999; border-radius: var(--radius-pill); }
        .yj-line.yin .yj-gap { flex: 0 0 20px; }

        .yao-text-wrap { font-size: 15px; line-height: 1.4; font-weight: 600; color: var(--ink); }
        .yao-text-wrap .sm-xiang { display: block; font-size: 12px; color: var(--ink-soft); margin-top: 4px; font-weight: 400; }

        .yj-footer { text-align: center; font-size: 12px; color: var(--ink-soft); padding: 15px 0; letter-spacing: 3px; font-weight: 500; }

        @media (max-width: 500px) {
            .yj-container { padding: 15px; gap: 15px; }
            .yj-row-split { gap: 20px; }
            .yj-yao-line-row { gap: 20px; }
            .title-text { font-size: 30px; }
            .yj-guaci-box { font-size: 20px; min-height: 100px; }
            .xiang-text { font-size: 16px; }
            .xiang-text b { font-size: 14px; }
            .tuan-content { font-size: 14px; }
            .yj-line { height: 30px; }
        }
    </style>
</head>
<body>

<div class="yj-container">
    <!-- 第一行：卦名 + 大象 -->
    <div class="yj-row-split">
        <div class="yj-seal-box">
            <div class="yj-img-seal img-gua"></div>
            <div>
                <div class="title-text" id="yjGuaName"></div>
                <div class="sub-text" id="yjGuaNo"></div>
            </div>
        </div>
        <div class="yj-seal-box">
            <div class="yj-img-seal img-xiang"></div>
            <div class="xiang-text" id="yjDaxiang"></div>
        </div>
    </div>

    <!-- 第二行：卦辞 + 彖传 -->
    <div class="yj-row-split">
        <div class="yj-guaci-box" id="yjGuaci"></div>
        <div class="yj-tuan-box">
            <div class="img-tuan-icon"></div>
            <div class="tuan-content" id="yjTuan"></div>
        </div>
    </div>

    <!-- 第三行：六爻 -->
    <div id="yjMainContent" class="yj-lines-master"></div>

    <div class="yj-footer">点击六爻 · 阴阳变化 · 经文随之</div>
</div>

<script>
    // 初始状态：噬嗑卦 (101001) 从上爻到初爻
    let state = [1,0,1,0,0,1]; 

    function render() {
        const k = state.join('');
        if (typeof GUA === 'undefined' || !GUA[k]) return;
        const g = GUA[k];

        // 填充基本信息
        document.getElementById('yjGuaName').innerText = g.name;
        document.getElementById('yjGuaNo').innerText = `周易六十四卦`;
        document.getElementById('yjGuaci').innerText = g.guaci;
        
        // 大象传：修复逻辑，确保显示两行
        // 假设数据格式为 "卦象描述。君子/先王之行。"
        const dxParts = g.daxiang.split('。').filter(p => p.trim() !== '');
        if (dxParts.length >= 2) {
            document.getElementById('yjDaxiang').innerHTML = `${dxParts[0]}。<br><b>${dxParts[1]}。</b>`;
        } else {
            document.getElementById('yjDaxiang').innerText = g.daxiang;
        }
        
        document.getElementById('yjTuan').innerText = g.tuan;
        
        const mainBox = document.getElementById('yjMainContent');
        mainBox.innerHTML = '';
        
        // 渲染六爻
        state.forEach((s, i) => {
            const row = document.createElement('div');
            row.className = 'yj-yao-line-row';
            
            // 左侧：爻条
            const barWrap = document.createElement('div');
            barWrap.className = 'yao-bar-wrap';
            const l = document.createElement('div');
            l.className = 'yj-line ' + (s ? 'yang' : 'yin');
            l.innerHTML = s ? '<div class="yj-seg"></div>' : '<div class="yj-seg"></div><div class="yj-gap"></div><div class="yj-seg"></div>';
            l.onclick = () => { state[i] = state[i] ? 0 : 1; render(); };
            barWrap.appendChild(l);
            
            // 右侧：爻辞 + 小象
            const textWrap = document.createElement('div');
            textWrap.className = 'yao-text-wrap';
            const yaoData = g.yao[i]; // [爻辞, 小象]
            textWrap.innerHTML = yaoData[0] + `<span class="sm-xiang">象曰：${yaoData[1]}</span>`;
            
            row.appendChild(barWrap);
            row.appendChild(textWrap);
            mainBox.appendChild(row);
        });
    }

    // 页面加载后延迟渲染，确保 data.js 已就绪
    window.onload = () => { setTimeout(render, 300); };
</script>
</body>
</html>
