<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周易六十四卦交互看板</title>
    <style>
        body { font-family: "Microsoft YaHei", serif; background-color: #f4f4f4; margin: 0; display: flex; justify-content: center; padding: 20px; }
        .container { width: 900px; background: white; padding: 40px; box-shadow: 0 0 20px rgba(0,0,0,0.1); display: flex; gap: 40px; }
        
        /* 左侧卦象区 */
        .gua-visual { width: 300px; display: flex; flex-direction: column-reverse; gap: 15px; align-items: center; }
        .yao { width: 200px; height: 30px; cursor: pointer; transition: all 0.3s; }
        .yao.yang { background-color: #333; }
        .yao.yin { display: flex; justify-content: space-between; }
        .yao.yin div { width: 90px; height: 30px; background-color: #bbb; border-radius: 4px; }
        .yao.yang { border-radius: 4px; }
        .yao:hover { opacity: 0.7; transform: scale(1.05); }

        /* 右侧经文区 */
        .content { flex: 1; }
        .header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .gua-name { font-size: 48px; font-weight: bold; margin: 0; }
        .guaci { font-size: 20px; color: #444; margin-top: 10px; }
        
        .section { background: #eef2f7; padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        .section-title { font-weight: bold; color: #555; margin-bottom: 5px; font-size: 14px; }
        
        .yao-list { list-style: none; padding: 0; display: flex; flex-direction: column-reverse; gap: 12px; }
        .yao-item { border-left: 4px solid #ddd; padding-left: 10px; }
        .yao-text { font-size: 16px; font-weight: bold; }
        .xiang-text { font-size: 14px; color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <!-- 左侧：六爻交互 -->
    <div class="gua-visual" id="guaContainer">
        <!-- 动态生成六爻 -->
    </div>

    <!-- 右侧：经文显示 -->
    <div class="content">
        <div class="header">
            <h1 class="gua-name" id="guaName">加载中...</h1>
            <div class="guaci" id="guaci"></div>
        </div>

        <div class="section">
            <div class="section-title">【大象】</div>
            <div id="daxiang"></div>
        </div>

        <div class="section">
            <div class="section-title">【彖传】</div>
            <div id="tuan"></div>
        </div>

        <div class="section-title">【六爻经文】</div>
        <ul class="yao-list" id="yaoList">
            <!-- 动态生成爻辞 -->
        </ul>
    </div>
</div>

<!-- 引入数据文件 -->
<script src="data_simple.js"></script>
<script>
    // 初始化卦象：需卦 (111010)
    // 注意：数组索引 0 是初爻（最下方），5 是上爻（最上方）
    let currentGua = [1, 1, 1, 0, 1, 0];

    function render() {
        const guaKey = currentGua.join('');
        const data = window.IChingData[guaKey];

        if (!data) {
            document.getElementById('guaName').innerText = "未找到卦象 " + guaKey;
            return;
        }

        // 1. 更新文字内容
        document.getElementById('guaName').innerText = data.name;
        document.getElementById('guaci').innerText = data.guaci;
        document.getElementById('tuan').innerText = data.tuan;
        document.getElementById('daxiang').innerText = data.daxiang;

        // 2. 更新左侧图形
        const guaContainer = document.getElementById('guaContainer');
        guaContainer.innerHTML = '';
        currentGua.forEach((isYang, index) => {
            const yaoDiv = document.createElement('div');
            yaoDiv.className = `yao ${isYang ? 'yang' : 'yin'}`;
            if (!isYang) {
                yaoDiv.innerHTML = '<div></div><div></div>';
            }
            yaoDiv.onclick = () => toggleYao(index);
            guaContainer.appendChild(yaoDiv);
        });

        // 3. 更新右侧六爻列表
        const yaoList = document.getElementById('yaoList');
        yaoList.innerHTML = '';
        data.yao.forEach(y => {
            const li = document.createElement('li');
            li.className = 'yao-item';
            li.innerHTML = `<div class="yao-text">${y[0]}</div><div class="xiang-text">${y[1]}</div>`;
            yaoList.appendChild(li);
        });
    }

    function toggleYao(index) {
        currentGua[index] = currentGua[index] === 1 ? 0 : 1;
        render();
    }

    // 页面加载完成后初始化
    window.onload = render;
</script>
</body>
</html>
