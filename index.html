<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>易经六十四卦 · 比例复刻版</title>
    
    <!-- 强制不缓存，确保每次都读到你最新的 data_simple.js -->
    <script src="data_simple.js?t=123456"></script>
    
    <style>
        @font-face { 
            font-family: 'MiLanting'; 
            src: url('./fonts/MI_LanTing_Regular.ttf') format('truetype'); 
            font-display: swap; 
        }
        :root { --ink: #1a1a1a; --ink-soft: #444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'MiLanting', sans-serif !important; }
        html, body { height: 100%; width: 100%; overflow: hidden; margin: 0; padding: 0; }
        body { 
            display: flex; flex-direction: column;
            background: url('./images/界面背景.png') center/cover no-repeat fixed;
            padding: env(safe-area-inset-top) 5% env(safe-area-inset-bottom);
        }
        .layout {
            flex: 1; display: grid; grid-template-columns: 1fr 1.2fr;
            grid-template-rows: 1.2fr 1.8fr 4fr; gap: 20px 40px;
            max-width: 1000px; margin: 0 auto; width: 100%; visibility: hidden;
        }
        .gua-name {
            display: flex; align-items: center; background: url('./images/卦名背景.png') left center/contain no-repeat;
            font-size: clamp(40px, 11vw, 80px); font-weight: 600; padding-left: 10px;
        }
        .xiang-box { display: flex; align-items: center; gap: 15px; }
        .xiang-icon { width: 60px; height: 60px; flex: 0 0 60px; background: url('./images/大象.png') center/contain no-repeat; }
        .xiang-text { font-size: clamp(15px, 3.8vw, 19px); line-height: 1.4; font-weight: 600; }
        .xiang-text b { display: block; font-weight: 500; font-size: 0.9em; color: var(--ink-soft); margin-top: 4px; }
        .guaci { display: flex; align-items: center; font-size: clamp(22px, 5.5vw, 32px); font-weight: 600; }
        .tuan-box { background: url('./images/彖传背景.png') center/cover no-repeat; border-radius: 8px; padding: 18px; display: flex; align-items: center; }
        .tuan-text { font-size: clamp(13px, 3.2vw, 16px); line-height: 1.6; text-align: justify; }
        .yao-area { grid-column: 1 / 3; display: flex; flex-direction: column; justify-content: space-between; padding-top: 10px; }
        .yao-row { display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.06); padding: 8px 0; }
        .yao-bar { height: clamp(28px, 5.5vh, 40px); display: flex; gap: 12px; cursor: pointer; }
        .seg { height: 100%; }
        .yao-bar.yang .seg { flex: 1; background: #1a1a1a; border-radius: 2px; }
        .yao-bar.yin .seg { flex: 1; background: #999; border-radius: 20px; }
        .yao-bar.yin .gap { flex: 0 0 20px; }
        .yao-txt { font-size: clamp(13px, 3.4vw, 16px); line-height: 1.4; font-weight: 600; }
        .yao-txt i { display: block; font-style: normal; font-size: 0.85em; font-weight: 400; color: var(--ink-soft); margin-top: 3px; }
        #msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 18px; text-align: center; color: #666; }
    </style>
</head>
<body>
    <div id="msg">正在载入数据，请稍候...</div>
    <div class="layout" id="ui">
        <div class="gua-name" id="n"></div>
        <div class="xiang-box"><div class="xiang-icon"></div><div class="xiang-text" id="x"></div></div>
        <div class="guaci" id="c"></div>
        <div class="tuan-box"><div class="tuan-text" id="t"></div></div>
        <div class="yao-area" id="l"></div>
    </div>

<script>
    let state = [1,1,1,1,1,1]; // 初始乾卦

    function render() {
        const data = window.GUA;
        if (!data) return;
        
        const key = state.join('');
        const g = data[key];
        if (!g) {
            document.getElementById('msg').innerText = "未匹配到卦象编码：" + key;
            return;
        }

        document.getElementById('msg').style.display = 'none';
        document.getElementById('ui').style.visibility = 'visible';

        document.getElementById('n').innerText = g.name;
        document.getElementById('c').innerText = g.guaci;
        document.getElementById('t').innerText = g.tuan;

        // 大象传自动分行：第一个句号切分
        const dx = g.daxiang || "";
        const idx = dx.indexOf('。');
        if (idx !== -1) {
            document.getElementById('x').innerHTML = dx.substring(0, idx+1) + "<br><b>" + dx.substring(idx+1) + "</b>";
        } else {
            document.getElementById('x').innerText = dx;
        }

        const box = document.getElementById('l');
        box.innerHTML = '';
        state.forEach((s, i) => {
            const row = document.createElement('div');
            row.className = 'yao-row';
            const bar = document.createElement('div');
            bar.className = 'yao-bar ' + (s ? 'yang' : 'yin');
            bar.innerHTML = s ? '<div class="seg"></div>' : '<div class="seg"></div><div class="gap"></div><div class="seg"></div>';
            bar.onclick = () => { state[i] = state[i] ? 0 : 1; render(); };
            const txt = document.createElement('div');
            txt.className = 'yao-txt';
            const y = g.yao[i] || ["", ""];
            txt.innerHTML = y[0] + "<i>象曰：" + y[1] + "</i>";
            row.appendChild(bar); row.appendChild(txt); box.appendChild(row);
        });
    }

    // 每一秒检查一次数据是否载入
    const check = setInterval(() => {
        if (window.GUA) {
            clearInterval(check);
            render();
        }
    }, 1000);

    // 15秒后如果还没载入，报错
    setTimeout(() => {
        if (!window.GUA) {
            document.getElementById('msg').innerHTML = "<b>数据加载失败</b><br>请确保 data_simple.js 与 index.html 在同一文件夹<br>且文件内开头是 window.GUA = {";
        }
    }, 15000);
</script>
</body>
</html>
