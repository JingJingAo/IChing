<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>易经六十四卦 · 交互全息版</title>
    
    <!-- 引入外部数据文件 -->
    <script src="./data_simple.js"></script>
    
    <style>
        /* 字体加载 */
        @font-face { 
            font-family: 'MiLanting'; 
            src: url('./fonts/MI_LanTing_Regular.ttf') format('truetype'); 
            font-display: swap; 
        }

        :root {
            --ink: #1a1a1a;
            --ink-soft: #444;
            --radius-md: 8px;
        }

        /* 全局样式重置 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            margin: 0; padding: 0; 
            font-family: 'MiLanting', sans-serif !important;
        }
        
        body { 
            display: flex; flex-direction: column;
            background-image: url('./images/界面背景.png');
            background-size: cover; background-position: center;
            padding: env(safe-area-inset-top) 5vw env(safe-area-inset-bottom);
        }

        /* 核心网格布局：复刻图片比例 */
        .yj-master-layout {
            flex: 1; display: grid;
            grid-template-columns: 1fr 1.2fr; /* 左右分栏 */
            grid-template-rows: 1.2fr 1.8fr 4fr; /* 上中下比例 */
            gap: 20px 40px;
            padding: 20px 0;
            max-width: 1000px; margin: 0 auto; width: 100%;
            visibility: hidden; /* 初始隐藏，数据加载后再显示 */
        }

        /* --- 第一层：卦名印章 & 大象描述 --- */
        .box-gua-name {
            display: flex; align-items: center; justify-content: flex-start;
            background-image: url('./images/卦名背景.png');
            background-size: contain; background-repeat: no-repeat; background-position: left center;
            font-size: clamp(40px, 11vw, 75px); font-weight: 600; padding-left: 10px;
        }

        .box-daxiang { display: flex; align-items: center; gap: 15px; }
        .img-dx-icon {
            width: 60px; height: 60px; flex: 0 0 60px;
            background-image: url('./images/大象.png'); background-size: contain; background-repeat: no-repeat;
        }
        .dx-text-wrap { font-size: clamp(14px, 3.6vw, 18px); line-height: 1.45; font-weight: 600; }
        .dx-text-wrap b { display: block; font-weight: 500; font-size: 0.9em; color: var(--ink-soft); margin-top: 4px; }

        /* --- 第二层：卦辞 & 彖传背景块 --- */
        .box-guaci {
            display: flex; align-items: center;
            font-size: clamp(20px, 5vw, 28px); line-height: 1.5; font-weight: 600;
            padding-right: 15px;
        }

        .box-tuan {
            background-image: url('./images/彖传背景.png'); background-size: cover;
            border-radius: var(--radius-md); padding: 18px; 
            display: flex; flex-direction: column; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }
        .tuan-inner { font-size: clamp(12px, 3.1vw, 15px); line-height: 1.6; text-align: justify; }

        /* --- 第三层：六爻区域（左右对齐） --- */
        .area-bottom {
            grid-column: 1 / 3; display: flex; flex-direction: column; justify-content: space-between;
            padding-top: 10px;
        }
        .yao-row {
            display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; align-items: center;
            padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .yao-bar { height: clamp(26px, 5vh, 38px); width: 100%; display: flex; gap: 12px; cursor: pointer; }
        .seg { height: 100%; }
        .yao-bar.yang .seg { flex: 1; background: #1a1a1a; border-radius: 2px; }
        .yao-bar.yin .seg { flex: 1; background: #999; border-radius: 20px; }
        .yao-bar.yin .gap { flex: 0 0 20px; }

        .yao-text { font-size: clamp(12px, 3.3vw, 15px); line-height: 1.4; font-weight: 600; }
        .yao-text i { display: block; font-style: normal; font-size: 0.85em; font-weight: 400; color: var(--ink-soft); margin-top: 2px; }

        /* 状态提示 */
        #loading-tip {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            font-size: 18px; color: var(--ink-soft); letter-spacing: 2px;
        }

        @media (max-width: 500px) {
            .yj-master-layout { gap: 10px 20px; }
            .yao-row { gap: 20px; }
            .img-dx-icon { width: 50px; height: 50px; flex: 0 0 50px; }
        }
    </style>
</head>
<body>

<div id="loading-tip">正在载入经文...</div>

<div class="yj-master-layout" id="app">
    <!-- 第一层：名 & 象 -->
    <div class="box-gua-name" id="uiGuaName"></div>
    <div class="box-daxiang">
        <div class="img-dx-icon"></div>
        <div class="dx-text-wrap" id="uiDaxiang"></div>
    </div>

    <!-- 第二层：辞 & 彖 -->
    <div class="box-guaci" id="uiGuaci"></div>
    <div class="box-tuan">
        <div class="tuan-inner" id="uiTuan"></div>
    </div>

    <!-- 第三层：六爻 -->
    <div class="area-bottom" id="uiYaoBox"></div>
</div>

<script>
    // 初始卦象状态：噬嗑
    let state = [1, 0, 1, 0, 0, 1];

    /**
     * 核心渲染函数
     */
    function render() {
        // 安全检查：确保 GUA 对象已从 data_simple.js 加载
        if (typeof GUA === 'undefined') return;

        const key = state.join('');
        const data = GUA[key];
        if (!data) return;

        // 界面显示切换
        document.getElementById('loading-tip').style.display = 'none';
        document.getElementById('app').style.visibility = 'visible';

        // 填充基本文字
        document.getElementById('uiGuaName').innerText = data.name;
        document.getElementById('uiGuaci').innerText = data.guaci;
        document.getElementById('uiTuan').innerText = data.tuan;

        // 大象传自动分行逻辑：识别第一个句号
        const dxRaw = data.daxiang || "";
        const dotPos = dxRaw.indexOf('。');
        if (dotPos !== -1) {
            const line1 = dxRaw.substring(0, dotPos + 1);
            const line2 = dxRaw.substring(dotPos + 1);
            document.getElementById('uiDaxiang').innerHTML = line1 + "<br><b>" + line2 + "</b>";
        } else {
            document.getElementById('uiDaxiang').innerText = dxRaw;
        }

        // 渲染六爻列表
        const yaoContainer = document.getElementById('uiYaoBox');
        yaoContainer.innerHTML = '';

        state.forEach((s, i) => {
            const row = document.createElement('div');
            row.className = 'yao-row';

            // 爻条部分
            const bar = document.createElement('div');
            bar.className = 'yao-bar ' + (s ? 'yang' : 'yin');
            bar.innerHTML = s ? '<div class="seg"></div>' : '<div class="seg"></div><div class="gap"></div><div class="seg"></div>';
            bar.onclick = () => {
                state[i] = state[i] ? 0 : 1;
                render();
            };

            // 爻辞部分
            const text = document.createElement('div');
            text.className = 'yao-text';
            const yData = (data.yao && data.yao[i]) ? data.yao[i] : ["", ""];
            text.innerHTML = yData[0] + "<i>象曰：" + yData[1] + "</i>";

            row.appendChild(bar);
            row.appendChild(text);
            yaoContainer.appendChild(row);
        });
    }

    /**
     * 初始化：循环检查数据是否就绪
     */
    function init() {
        const checkInterval = setInterval(() => {
            if (typeof GUA !== 'undefined') {
                clearInterval(checkInterval);
                render();
            }
        }, 300);

        // 10秒超时处理
        setTimeout(() => {
            clearInterval(checkInterval);
            if (typeof GUA === 'undefined') {
                document.getElementById('loading-tip').innerHTML = "数据加载失败<br><small>请检查 data_simple.js 是否在同级目录且内容正确</small>";
            }
        }, 10000);
    }

    // 启动
    window.onload = init;
</script>
</body>
</html>
