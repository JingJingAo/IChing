<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>易经六十四卦 · 比例复刻版</title>
    
    <style>
        /* 1. 注册专属字体 */
        @font-face { 
            font-family: 'XuandongKaishu'; 
            src: url('./fonts/XuandongKaishu.ttf') format('truetype'); 
            font-display: swap; 
        }

        /* 2. 全局样式重置 */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'XuandongKaishu', sans-serif !important; 
        }
        
        html, body { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            margin: 0; 
            padding: 0; 
            background: #f7f5f0; 
        }

        body { 
            display: flex; 
            flex-direction: column;
            background: url('./images/界面背景.png') center/cover no-repeat fixed;
            padding: calc(10px + env(safe-area-inset-top)) 15px calc(10px + env(safe-area-inset-bottom)) 15px;
        }

        /* 3. 顶部区域：大象传 */
        .header-xiang {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.65);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 12px;
            padding: 10px 12px;
            margin-bottom: 12px;
            min-height: 76px;
        }

        .xiang-icon {
            width: 32px;      
            height: 32px;
            margin-right: 12px;
            flex-shrink: 0;
            background: url('./images/大象传.png') center/contain no-repeat;
        }

        .xiang-text {
            flex-grow: 1;
            font-size: 16px;
            color: #2b2b2b;
            line-height: 1.5;
            letter-spacing: 0.5px;
        }

        /* 4. 中部主战场：太极卦名与六爻交互 */
        .main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        /* 卦名与圆形太极图复合区域 */
        .guaname-area {
            position: relative;
            width: 105px;
            height: 105px;
            margin: 0 auto 12px auto;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 底衬圆形太极图 */
        .taiji-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('./images/太极底图.png') center/contain no-repeat;
            z-index: 1;
        }

        /* 动态布局的卦名容器 */
        .name-display {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            color: #1a1a1a;
        }

        /* 单字布局样式 */
        .name-single {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            font-size: 52px;
            font-weight: bold;
        }

        /* 双字斜向错开布局样式 */
        .name-double {
            position: relative;
            width: 100%;
            height: 100%;
            font-size: 38px;
            font-weight: bold;
        }
        .name-double .char1 {
            position: absolute;
            top: 10px;
            left: 12px;
        }
        .name-double .char2 {
            position: absolute;
            bottom: 10px;
            right: 12px;
        }

        /* 5. 自下而上的六爻列表 */
        .yao-list-box {
            flex-grow: 1;
            display: flex;
            flex-direction: column-reverse; /* 关键铁律：让初爻渲染在最下方 */
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 14px;
            padding: 8px;
            overflow: hidden;
        }

        .row-yao {
            display: flex;
            align-items: center;
            height: 15%;
            padding: 0 4px;
        }

        .bar-yao {
            width: 110px;
            height: 28px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            flex-shrink: 0;
            margin-right: 12px;
        }

        .seg { background: #1a1a1a; height: 100%; transition: background 0.2s; }
        .gap { background: transparent; height: 100%; width: 18%; }

        .yang .seg { width: 100%; border-radius: 3px; }
        .yin .seg { width: 41%; border-radius: 3px; }

        .text-yao {
            flex-grow: 1;
            font-size: 13px;
            color: #333;
            line-height: 1.3;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .text-yao i {
            font-style: normal;
            color: #666;
            font-size: 11.5px;
            margin-top: 2px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="header-xiang">
        <div class="xiang-icon"></div>
        <div id="ui-xiang" class="xiang-text">正在加载易理...</div>
    </div>

    <div class="main-container">
        <div class="guaname-area">
            <div class="taiji-bg"></div>
            <div id="ui-name-container" class="name-display"></div>
        </div>

        <div id="ui-yao-list" class="yao-list-box"></div>
    </div>

    <script>
        document.write('<script src="./data_simple.js?t=' + new Date().getTime() + '" onload="initIChing()"><\/script>');
    </script>
    
    <script>
        // 铁律状态：state[0]为最下方的初爻，state[5]为最上方的上爻
        let state = [1, 1, 1, 1, 1, 1]; 

        // 大象传智能换行
        function formatDaxiang(dx) {
            if (!dx) return "六爻乾坤，变在其中。";
            const match = dx.match(/(.*?。)(君子以.*|先王以.*|后以.*)/);
            if (match) {
                return `${match[1]}<br>${match[2]}`;
            }
            return dx;
        }

        // 核心渲染引擎
        function render() {
            // 兼容可能出现的各种挂载形式，防空处理
            const data = window.IChingData || window.GUA || {};
            
            // 铁律：左边第一位代表初爻(state[0])，右边最后一位代表上爻(state[5])
            const currentKey = [...state].join('');
            const currentGua = data[currentKey] || { name: "未知卦", guaci: "", daxiang: "尚未获取到大象传", yao: [] };

            // 1. 渲染大象传
            document.getElementById('ui-xiang').innerHTML = formatDaxiang(currentGua.daxiang);

            // 2. 动态布局卦名
            const nameContainer = document.getElementById('ui-name-container');
            const gName = currentGua.name || "卦";
            if (gName.length === 1) {
                nameContainer.innerHTML = `<div class="name-single">${gName}</div>`;
            } else {
                nameContainer.innerHTML = `
                    <div class="name-double">
                        <span class="char1">${gName.charAt(0)}</span>
                        <span class="char2">${gName.charAt(1)}</span>
                    </div>`;
            }

            // 3. 构建六爻视图
            const list = document.getElementById('ui-yao-list');
            list.innerHTML = ''; 

            state.forEach((s, i) => {
                const row = document.createElement('div');
                row.className = 'row-yao';

                const bar = document.createElement('div');
                bar.className = 'bar-yao ' + (s ? 'yang' : 'yin');
                bar.innerHTML = s ? '<div class="seg"></div>' : '<div class="seg"></div><div class="gap"></div><div class="seg"></div>';
                
                bar.onclick = () => { 
                    state[i] = s ? 0 : 1; 
                    render(); 
                };

                const txt = document.createElement('div');
                txt.className = 'text-yao';
                const y = (currentGua.yao && currentGua.yao[i]) ? currentGua.yao[i] : ["", ""];
                txt.innerHTML = `${y[0]}<i>象曰：${y[1]}</i>`;

                row.appendChild(bar);
                row.appendChild(txt);
                list.appendChild(row);
            });
        }

        // 文件加载完毕后百分之百自动触发的入口
        function initIChing() {
            render();
        }
    </script>
</body>
</html>
