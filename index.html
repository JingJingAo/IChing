<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>易经六十四卦 · 比例复刻版</title>
    
    <!-- 动态时间戳防止缓存 -->
    <script>
        document.write('<script src="./data_simple.js?t=' + new Date().getTime() + '"><\/script>');
    </script>
    
    <style>
        /* 1. 注册专属字体 */
        @font-face { 
            font-family: 'XuandongKaishu'; 
            src: url('./fonts/XuandongKaishu.ttf') format('truetype'); 
            font-display: swap; 
        }

        /* 2. 全局样式重置 */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'XuandongKaishu', sans-serif !important; 
        }
        
        html, body { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            margin: 0; 
            padding: 0; 
            background: #f7f5f0; 
        }

        body { 
            display: flex; 
            flex-direction: column;
            background: url('./images/界面背景.jpg') center/cover no-repeat fixed;
            padding: calc(10px + env(safe-area-inset-top)) 12px calc(10px + env(safe-area-inset-bottom)) 12px;
        }

        /* 3. ① & ⑤ 网格比例重构：
           - 横向：左栏 2/5 (2fr)，右栏 3/5 (3fr)
           - 纵向：提升一、二层高度，压缩第三层爻条/爻辞区 (从 1.1/1.3/3.6 调整为 1.4fr 1.6fr 3fr) */
        .grid-container {
            display: grid;
            grid-template-columns: 2fr 3fr; 
            grid-template-rows: 1.4fr 1.6fr 3fr; 
            gap: 12px;
            width: 100%;
            height: 100%;
        }

        /* 古风卡片基础样式 */
        .card {
            background: rgba(255, 255, 255, 0.65);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 12px;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden; /* 严禁溢出 */
        }

        .card-content {
            color: #2b2b2b;
            line-height: 1.4;
            letter-spacing: 0.5px;
            text-align: justify;
            width: 100%;
        }

        /* ==================== 左侧区域 (2/5 宽度) ==================== */
        
        /* 左上：卦名区 */
        #block-left-top {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.4); 
        }

        /* ② 卦名背景图固定大小 */
        .guaname-bg {
            position: relative;
            width: 85px;
            height: 85px;
            background: url('./images/卦名背景.png') center/contain no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ② 将文字容器绝对锁定在背景图正内部 */
        .name-display {
            position: absolute;
            top: 0;
            left: 0;
            width: 85px;
            height: 85px;
            color: #1a1a1a;
        }

        /* 单字居中 */
        .name-single {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            font-size: 44px;
            font-weight: bold;
        }

        /* ② 双字排布：绝对不超出 85px 的背景圆图范围 */
        .name-double {
            position: relative;
            width: 100%;
            height: 100%;
            font-size: 30px;
            font-weight: bold;
        }
        .name-double .char1 {
            position: absolute;
            top: 6px;
            left: 10px;
        }
        .name-double .char2 {
            position: absolute;
            bottom: 6px;
            right: 10px;
        }

        /* 左中：卦辞区 */
        #block-left-middle {
            justify-content: center;
            align-items: center;
        }

        /* 左下：六爻条交互区 */
        #block-left-bottom {
            display: flex;
            flex-direction: column-reverse;
            justify-content: space-around;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.4);
        }

        .row-yao {
            display: flex;
            align-items: center;
            height: 14%;
            width: 100%;
        }

        .bar-yao {
            width: 100%; 
            height: 20px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }

        .seg { background: #1a1a1a; height: 100%; transition: background 0.2s; }
        .gap { background: transparent; height: 100%; width: 24%; }

        .yang .seg { width: 100%; border-radius: 2px; }
        .yin .seg { width: 38%; border-radius: 2px; }


        /* ==================== 右侧区域 (3/5 宽度) ==================== */
        
        /* ③ 大象区 与 ④ 彖传区 统一的左上侧图标样式 */
        .corner-icon {
            position: absolute;
            left: 12px;
            top: 10px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        
        #block-right-top .corner-icon {
            width: 26px; height: 26px;
            background-image: url('./images/大象.png');
        }

        #block-right-middle .corner-icon {
            width: 24px; height: 24px;
            background-image: url('./images/彖传.png');
        }

        /* ③ & ④ 文字一律放在图片之下 */
        .below-icon-content {
            margin-top: 28px; /* 撑开顶部图标的高度 */
            width: 100%;
            height: calc(100% - 28px);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 右中：彖传背景 */
        #block-right-middle {
            background: url('./images/彖传背景.png') center/cover no-repeat rgba(255, 255, 255, 0.5);
        }

        /* 右下：爻辞与小象组合区 */
        #block-right-bottom {
            display: flex;
            flex-direction: column-reverse;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.55);
            padding: 4px 10px;
        }

        /* ⑥ 爻辞排版：建立悬挂缩进机制 */
        .text-yao-display {
            height: 15%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-bottom: 1px dashed rgba(0, 0, 0, 0.04);
            padding-bottom: 2px;
            line-height: 1.35;
            text-align: justify;
        }
        .text-yao-display:first-child { border-bottom: none; }

        /* ⑥ 爻辞加粗，并预留两个字的缩进空间 */
        .yao-text-line {
            font-weight: bold; /* 爻辞加粗 */
            color: #2b2b2b;
            padding-left: 2.3em; /* 撑开左侧九四、六三等的固定宽度占位 */
            text-indent: -2.3em; /* 首行反向缩进，使其对齐 */
        }

        /* ⑥ 小象象辞字号变小，同样保持缩进换行对齐 */
        .yao-text-line i {
            font-style: normal;
            font-weight: normal; /* 象辞不加粗 */
            color: #555;
            display: block;
            margin-top: 1px;
            padding-left: 3.4em; /* 象曰：共占位稍长 */
            text-indent: -3.4em;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        
        <!-- 【左上】：卦名区 -->
        <div id="block-left-top" class="card">
            <div class="guaname-bg">
                <!-- ② 锁定在背景图之内的名字容器 -->
                <div id="ui-name-container" class="name-display"></div>
            </div>
        </div>

        <!-- 【右上】：大象传 -->
        <div id="block-right-top" class="card">
            <div class="corner-icon"></div>
            <div class="below-icon-content">
                <div id="ui-daxiang" class="card-content"></div>
            </div>
        </div>

        <!-- 【左中】：卦辞区 -->
        <div id="block-left-middle" class="card">
            <div id="ui-guaci" class="card-content" style="text-align: center;"></div>
        </div>

        <!-- 【右中】：彖传区 -->
        <div id="block-right-middle" class="card">
            <div class="corner-icon"></div>
            <div class="below-icon-content">
                <div id="ui-tuan" class="card-content"></div>
            </div>
        </div>

        <!-- 【左下】：六爻条图形区 -->
        <div id="block-left-bottom" class="card"></div>

        <!-- 【右下】：六爻爻辞与小象 -->
        <div id="block-right-bottom" class="card"></div>

    </div>

    <script>
        let state = [1, 1, 1, 1, 1, 1]; 
        const yaoNames = ["初", "二", "三", "四", "五", "上"];

        // 智能动态单体字号计算
        function autoFontSize(text, maxLen, minSize, maxSize) {
            if (!text) return minSize + "px";
            const len = text.length;
            if (len <= 10) return maxSize + "px";
            if (len >= maxLen) return minSize + "px";
            const size = maxSize - ((len - 10) / (maxLen - 10)) * (maxSize - minSize);
            return Math.max(minSize, Math.min(maxSize, size)) + "px";
        }

        // 核心渲染引擎
        function render() {
            const data = window.IChingData || window.GUA || {};
            const currentKey = [...state].join('');
            const currentGua = data[currentKey];
            
            if (!currentGua) return;

            // 1. ② 渲染左上：卦名自适应（彻底锁在圆景内）
            const nameContainer = document.getElementById('ui-name-container');
            const gName = currentGua.name || "卦";
            if (gName.length === 1) {
                nameContainer.innerHTML = `<div class="name-single">${gName}</div>`;
            } else {
                nameContainer.innerHTML = `
                    <div class="name-double">
                        <span class="char1">${gName.charAt(0)}</span>
                        <span class="char2">${gName.charAt(1)}</span>
                    </div>`;
            }

            // 2. ③ 渲染右上：大象传（强制两行，且第二行字数多时独立缩小第二行）
            const dxBox = document.getElementById('ui-daxiang');
            const dxRaw = currentGua.daxiang || "";
            const dxMatch = dxRaw.match(/(.*?。)(君子以.*|先王以.*|后以.*)/);
            if (dxMatch) {
                const line1 = dxMatch[1];
                const line2 = dxMatch[2];
                // 第一行标准字号，第二行根据自身长度动态计算字号，防止其折行，强锁整区只有两行
                const line2Size = autoFontSize(line2, 28, 12, 19);
                dxBox.innerHTML = `<span style="font-size:19px; display:block;">${line1}</span><span style="font-size:${line2Size}; display:block; margin-top:2px;">${line2}</span>`;
            } else {
                dxBox.innerHTML = `<span style="font-size:18px;">${dxRaw}</span>`;
            }

            // 3. 渲染左中：卦辞（根据字数缩放，配合 ⑤ 空间变大，字号可以更舒展）
            const gcBox = document.getElementById('ui-guaci');
            gcBox.innerText = currentGua.guaci || "";
            gcBox.style.fontSize = autoFontSize(currentGua.guaci, 35, 14, 22);

            // 4. ④ 渲染右中：彖传（文字在图片下方，自动计算字号适应）
            const tuanBox = document.getElementById('ui-tuan');
            tuanBox.innerText = currentGua.tuan || "";
            tuanBox.style.fontSize = autoFontSize(currentGua.tuan, 160, 11, 16);

            // 5. 渲染左下（纯净六爻条拉满）与 右下（爻辞小象）
            const leftBottom = document.getElementById('block-left-bottom');
            const rightBottom = document.getElementById('block-right-bottom');
            
            leftBottom.innerHTML = '';
            rightBottom.innerHTML = '';

            state.forEach((s, i) => {
                // ------ 左下：纯净交互六爻条 ------
                const row = document.createElement('div');
                row.className = 'row-yao';

                const bar = document.createElement('div');
                bar.className = 'bar-yao ' + (s ? 'yang' : 'yin');
                bar.innerHTML = s ? '<div class="seg"></div>' : '<div class="seg"></div><div class="gap"></div><div class="seg"></div>';
                
                bar.onclick = () => { 
                    state[i] = s ? 0 : 1; 
                    render(); 
                };

                row.appendChild(bar);
                leftBottom.appendChild(row);

                // ------ 右下：⑥ 爻辞加粗/小象变小 与 悬挂对齐缩进 ------
                const textDisplay = document.createElement('div');
                textDisplay.className = 'text-yao-display';
                
                const y = (currentGua.yao && currentGua.yao[i]) ? currentGua.yao[i] : ["", ""];
                
                // 还原爻位前缀标签（九四、六三等）
                const isYang = (s === 1);
                const yaoLabel = (i === 0 || i === 5) ? 
                    (isYang ? yaoNames[i] + "九" : yaoNames[i] + "六") : 
                    (isYang ? "九" + yaoNames[i] : "六" + yaoNames[i]);

                const yaoCis = yaoLabel + "：" + y[0];
                const xiangCis = y[1] ? `象曰：${y[1]}` : "";

                // 根据各自字数，动态调配合理字号
                const yaoSize = autoFontSize(yaoCis, 35, 11, 14.5);
                // 确保小象字号比爻辞更小
                const xiangSize = autoFontSize(xiangCis, 35, 9.5, 12);

                textDisplay.innerHTML = `
                    <span class="yao-text-line" style="font-size: ${yaoSize};">${yaoCis}</span>
                    <span class="yao-text-line" style="font-size: ${xiangSize};"><i>${xiangCis}</i></span>
                `;
                
                rightBottom.appendChild(textDisplay);
            });
        }

        // 数据文件加载时序轮询
        const dataChecker = setInterval(() => {
            const checkData = window.IChingData || window.GUA;
            if (checkData && Object.keys(checkData).length > 0) {
                clearInterval(dataChecker);
                render();
            }
        }, 100);
    </script>
</body>
</html>
