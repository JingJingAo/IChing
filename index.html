<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>易经六十四卦 · 比例复刻版</title>
    
    <script>
        document.write('<script src="./data_simple.js?t=' + new Date().getTime() + '" onload="initIChing()"><\/script>');
    </script>
    
    <style>
        /* 1. 注册专属字体 */
        @font-face { 
            font-family: 'XuandongKaishu'; 
            src: url('./fonts/XuandongKaishu.ttf') format('truetype'); 
            font-display: swap; 
        }

        /* 2. 全局样式重置 */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'XuandongKaishu', sans-serif !important; 
        }
        
        html, body { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            margin: 0; 
            padding: 0; 
            background: #f7f5f0; 
        }

        body { 
            display: flex; 
            flex-direction: column;
            background: url('./images/界面背景.jpg') center/cover no-repeat fixed;
            padding: calc(8px + env(safe-area-inset-top)) 10px calc(8px + env(safe-area-inset-bottom)) 10px;
        }

        /* 3. 严格对齐的双栏网格主架构 */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 左边三块，右边三块，各占一半 */
            grid-template-rows: 1.1fr 1.3fr 3.6fr; /* 严格对应上、中、下三层的高度比例 */
            gap: 10px;
            width: 100%;
            height: 100%;
        }

        /* 通用卡片古风样式 */
        .card {
            background: rgba(255, 255, 255, 0.65);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 12px;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            overflow-y: auto; /* 文本过长时允许内部安全滚动，绝不撑破全屏 */
        }

        .card-title-area {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            flex-shrink: 0;
        }

        .card-icon {
            width: 24px;
            height: 24px;
            margin-right: 6px;
            flex-shrink: 0;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

        .card-label {
            font-size: 14px;
            color: #555;
            font-weight: bold;
        }

        .card-content {
            font-size: 14.5px;
            color: #2b2b2b;
            line-height: 1.45;
            letter-spacing: 0.3px;
        }

        /* ==================== 左侧三块专属样式 ==================== */
        
        /* 左上：卦名区 */
        #block-left-top {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.4); /* 让底图更通透 */
        }

        /* 卦名圆形太极底图 */
        .guaname-bg {
            position: absolute;
            width: 85px;
            height: 85px;
            background: url('./images/卦名背景.png') center/contain no-repeat;
            z-index: 1;
        }

        .name-display {
            position: relative;
            z-index: 2;
            width: 85px;
            height: 85px;
            color: #1a1a1a;
        }

        /* 单字布局 */
        .name-single {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            font-size: 44px;
            font-weight: bold;
        }

        /* 双字斜向错开布局 */
        .name-double {
            position: relative;
            width: 100%;
            height: 100%;
            font-size: 32px;
            font-weight: bold;
        }
        .name-double .char1 {
            position: absolute;
            top: 4px;
            left: 6px;
        }
        .name-double .char2 {
            position: absolute;
            bottom: 4px;
            right: 6px;
        }

        /* 左中：卦辞区 */
        #block-left-middle {
            justify-content: center;
        }

        /* 左下：六爻交互区 */
        #block-left-bottom {
            display: flex;
            flex-direction: column-reverse; /* 铁律：让初爻在最下方 */
            justify-content: space-around;
            padding: 8px;
            background: rgba(255, 255, 255, 0.4);
        }

        .row-yao {
            display: flex;
            align-items: center;
            height: 15%;
        }

        .bar-yao {
            width: 75px;
            height: 22px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            flex-shrink: 0;
            margin-right: 8px;
        }

        .seg { background: #1a1a1a; height: 100%; transition: background 0.2s; }
        .gap { background: transparent; height: 100%; width: 20%; }

        .yang .seg { width: 100%; border-radius: 2px; }
        .yin .seg { width: 40%; border-radius: 2px; }

        .yao-tag {
            font-size: 12px;
            color: #666;
            font-weight: bold;
        }

        /* ==================== 右侧三块专属样式 ==================== */
        
        /* 右上：大象传 */
        #block-right-top .card-icon {
            background-image: url('./images/大象.png');
            width: 26px; height: 26px;
        }

        /* 右中：彖传（带专属卡片背景） */
        #block-right-middle {
            background: url('./images/彖传背景.png') center/cover no-repeat rgba(255, 255, 255, 0.5);
        }
        #block-right-middle .card-icon {
            background-image: url('./images/彖传.png');
        }

        /* 右下：爻辞与小象联动区 */
        #block-right-bottom {
            display: flex;
            flex-direction: column-reverse; /* 对应左边自下而上的排列展示 */
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.55);
        }

        .text-yao-display {
            height: 15%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-size: 12px;
            color: #444;
            line-height: 1.3;
            border-bottom: 1px dashed rgba(0, 0, 0, 0.04);
            padding-bottom: 2px;
            transition: all 0.2s;
        }
        .text-yao-display:first-child { border-bottom: none; }

        .text-yao-display.active {
            color: #000;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 4px;
            padding-left: 4px;
        }

        .text-yao-display i {
            font-style: normal;
            color: #666;
            font-size: 11px;
            margin-top: 1px;
            display: block;
        }
        .text-yao-display.active i {
            color: #333;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        
        <div id="block-left-top" class="card">
            <div class="guaname-bg"></div>
            <div id="ui-name-container" class="name-display"></div>
        </div>

        <div id="block-right-top" class="card">
            <div class="card-title-area">
                <div class="card-icon"></div>
                <div class="card-label">象曰</div>
            </div>
            <div id="ui-daxiang" class="card-content"></div>
        </div>

        <div id="block-left-middle" class="card">
            <div class="card-title-area">
                <div class="card-label">卦辞</div>
            </div>
            <div id="ui-guaci" class="card-content"></div>
        </div>

        <div id="block-right-middle" class="card">
            <div class="card-title-area">
                <div class="card-icon"></div>
                <div class="card-label">彖传</div>
            </div>
            <div id="ui-tuan" class="card-content"></div>
        </div>

        <div id="block-left-bottom" class="card"></div>

        <div id="block-right-bottom" class="card"></div>

    </div>

    <script>
        // 铁律状态：state[0]为初爻（最下），state[5]为上爻（最上）
        let state = [1, 1, 1, 1, 1, 1]; 
        
        // 爻名汉字映射（配合自下而上排列）
        const yaoNames = ["初", "二", "三", "四", "五", "上"];

        // 大象传智能分行
        function formatDaxiang(dx) {
            if (!dx) return "";
            const match = dx.match(/(.*?。)(君子以.*|先王以.*|后以.*)/);
            if (match) {
                return `${match[1]}<br>${match[2]}`;
            }
            return dx;
        }

        // 核心大渲染引擎
        function render() {
            const data = window.IChingData || {};
            
            // 铁律拼装：自左向右（初爻在最左，上爻在最右）匹配全新的二进制Key
            const currentKey = [...state].join('');
            const currentGua = data[currentKey] || { name: "未知卦", guaci: "", tuan: "", daxiang: "", yao: [] };

            // 1. 渲染左上：卦名自适应
            const nameContainer = document.getElementById('ui-name-container');
            const gName = currentGua.name || "卦";
            if (gName.length === 1) {
                nameContainer.innerHTML = `<div class="name-single">${gName}</div>`;
            } else {
                nameContainer.innerHTML = `
                    <div class="name-double">
                        <span class="char1">${gName.charAt(0)}</span>
                        <span class="char2">${gName.charAt(1)}</span>
                    </div>`;
            }

            // 2. 渲染右上：大象传分行
            document.getElementById('ui-daxiang').innerHTML = formatDaxiang(currentGua.daxiang);

            // 3. 渲染左中：卦辞
            document.getElementById('ui-guaci').innerText = currentGua.guaci || "暂无卦辞";

            // 4. 渲染右中：彖传
            document.getElementById('ui-tuan').innerText = currentGua.tuan || "暂无彖传";

            // 5. 渲染左下（六爻交互）与 右下（爻辞小象）
            const leftBottom = document.getElementById('block-left-bottom');
            const rightBottom = document.getElementById('block-right-bottom');
            
            leftBottom.innerHTML = '';
            rightBottom.innerHTML = '';

            state.forEach((s, i) => {
                // ------ 左下：画爻 ------
                const row = document.createElement('div');
                row.className = 'row-yao';

                const bar = document.createElement('div');
                bar.className = 'bar-yao ' + (s ? 'yang' : 'yin');
                bar.innerHTML = s ? '<div class="seg"></div>' : '<div class="seg"></div><div class="gap"></div><div class="seg"></div>';
                
                // 点击取反触发重绘
                bar.onclick = () => { 
                    state[i] = s ? 0 : 1; 
                    render(); 
                };

                // 判断当前九/六称呼
                const isYang = (s === 1);
                const yaoLabel = (i === 0 || i === 5) ? 
                    (isYang ? yaoNames[i] + "九" : yaoNames[i] + "六") : 
                    (isYang ? "九" + yaoNames[i] : "六" + yaoNames[i]);

                const tag = document.createElement('div');
                tag.className = 'yao-tag';
                tag.innerText = yaoLabel;

                row.appendChild(bar);
                row.appendChild(tag);
                leftBottom.appendChild(row);

                // ------ 右下：展现爻辞与小象 ------
                const textDisplay = document.createElement('div');
                textDisplay.className = 'text-yao-display';
                
                // 默认高亮正在点击更新的这个爻位或做动态提示
                const y = (currentGua.yao && currentGua.yao[i]) ? currentGua.yao[i] : ["暂无爻辞", "暂无小象"];
                textDisplay.innerHTML = `${y[0]}<i>象曰：${y[1]}</i>`;
                
                // 默认让它们都清晰列出，并自下而上严格呼应
                rightBottom.appendChild(textDisplay);
            });
        }

        // 数据加载完毕后自动唤醒
        function initIChing() {
            render();
        }
    </script>
</body>
</html>
